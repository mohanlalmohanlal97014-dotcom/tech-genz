{% extends "base.html" %} {% block content %}

<div class="container">
  <h2 class="text-center mb-5">Browse Companies</h2>

  <!-- SEARCH COMPANY -->
  <a
    href="{% url 'student-dashboard' %}"
    class="btn btn-primary text-light mb-4"
    >← Back To Dashboard</a
  >

  <div class="card card-custom p-4 mb-5">
    <form method="GET">
      <div class="row">
        <div class="col-md-10">
          <input
            type="text"
            name="search"
            class="form-control"
            placeholder="Search Company Name"
          />
        </div>

        <div class="col-md-2 d-grid">
          <button class="btn btn-primary">Search</button>
        </div>
      </div>
    </form>
  </div>

  <div class="row g-4">
    {% for company in companies %}

    <div class="col-md-6 col-lg-4">
      <div class="card card-custom h-100 shadow-sm">
        <div class="card-body d-flex flex-column">
          <h5 class="text-primary fw-bold">{{ company.company_name }}</h5>

          <p class="text-muted flex-grow-1">
            {{ company.description|truncatewords:20 }}
          </p>

          <p>
            <strong>Website:</strong>
            <a href="{{ company.website }}" target="_blank">
              {{ company.website }}
            </a>
          </p>

          <a
            href="{% url 'view-company-profile' company.profile.id %}"
            class="btn btn-primary w-100 mt-3"
          >
            View Company
          </a>
        </div>
      </div>
    </div>

    {% endfor %}
  </div>
</div>

{% endblock %}
