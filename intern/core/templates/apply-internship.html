{% extends "base.html" %} {% block content %}

<div class="container">
  <div class="row justify-content-center">
    <div class="col-lg-6">
      <div class="card card-custom p-4">
        <h3 class="text-center mb-3 text-primary">Apply for Internship</h3>

        <hr />

        <!-- Internship Info -->
        <div class="mb-3">
          <h5>{{ internship.title }}</h5>
          <p class="text-muted">{{ internship.company_name.company_name }}</p>
        </div>

        <form method="POST" enctype="multipart/form-data">
          {% csrf_token %}

          <div class="mb-3">
            <label class="form-label">Upload Resume (PDF only)</label>
            <input
              type="file"
              name="resume"
              class="form-control"
              accept=".pdf"
              required
            />
          </div>
          {% if submitted %}
          <div class="alert alert-success">
            Your application has been submitted successfully!
          </div>
          {% endif %}
          <button type="submit" class="btn btn-primary w-100 btn-lg">
            Submit Application
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
